<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>الدفع | RevoFlow</title>

  <!-- حماية الصفحة -->
  <script src="auth-check.js"></script>
  <script>checkAuth();</script>

  <style>
    body {
      background:#111;
      color:white;
      font-family:Arial;
      padding:20px;
      text-align:center;
    }
    .box {
      background:#1a1a1a;
      padding:25px;
      border-radius:12px;
      width:320px;
      margin:auto;
      margin-top:40px;
    }
    button {
      background:#00aaff;
      color:white;
      border:none;
      padding:12px;
      width:100%;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
      margin-top:15px;
    }
    button:hover {
      background:#0088cc;
    }
  </style>
</head>

<body>

<h2>💳 الدفع عبر Binance / NOWPayments</h2>

<div class="box">
  <h3>اشتراك RevoFlow</h3>
  <p>السعر: <strong>10$</strong></p>

  <button onclick="pay()">ادفع الآن</button>
</div>

<script>
async function pay() {
  const res = await fetch("/create-payment");
  const data = await res.json();

  // رابط الدفع من NOWPayments
  window.location.href = data.pay_url;
}
</script>

</body>
</html>
