<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رفع فيديو - RevoAI</title>
  <style>
    body { background:#0d0d0d; color:white; font-family:Arial; text-align:center; direction:rtl; }
    .logo { display:flex; justify-content:center; align-items:center; margin-top:40px; }
    .logo img { height:70px; margin-left:10px; border-radius:8px; }
    .logo span { font-size:28px; font-weight:bold; color:#4a90e2; }
    form { max-width:400px; margin:auto; margin-top:30px; background:#111; padding:25px; border-radius:10px; text-align:right; }
    input, textarea { width:100%; padding:12px; margin:10px 0; background:#222; border:none; border-radius:6px; color:white; }
    button { width:100%; padding:12px; background:#3498db; border:none; border-radius:6px; color:white; font-size:18px; cursor:pointer; }
  </style>
</head>
<body>

<div class="logo">
  <img src="logo.png" alt="RevoAI">
  <span>RevoAI</span>
</div>

<h2>رفع صورة أو نص لتوليد فيديو</h2>

<form>
  <label>ارفع صورة</label>
  <input type="file" accept="image/*">

  <label>اكتب النص</label>
  <textarea placeholder="اكتب النص هنا..."></textarea>

  <button type="submit">توليد الفيديو</button>
</form>

</body>
</html>
