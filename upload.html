<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رفع فيديو - RevoAI</title>
  <style>
    body {
      background:#111;
      color:white;
      font-family:Arial, sans-serif;
      text-align:center;
      padding:40px;
    }
    .logo {
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:20px;
    }
    .logo img {
      height:60px;
      border-radius:8px;
      margin-right:10px;
    }
    .logo span {
      font-size:24px;
      font-weight:bold;
      color:#4a90e2;
    }
    input, textarea {
      width:300px;
      padding:10px;
      margin:10px;
      border-radius:6px;
      border:none;
    }
    button {
      width:320px;
      padding:10px;
      background:#3498db;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }
    button:hover {
      background:#2980b9;
    }
  </style>
</head>
<body>

  <!-- شعار RevoAI -->
  <div class="logo">
    <img src="logo.png" alt="RevoAI">
    <span>RevoAI</span>
  </div>

  <!-- عنوان -->
  <h2>📤 رفع فيديو جديد</h2>

  <!-- فورم رفع الفيديو -->
  <form>
    <input type="file" accept="video/*" required>
    <input type="text" placeholder="أدخل عنوان الفيديو" required>
    <textarea placeholder="وصف الفيديو..."></textarea>
    <button type="submit">رفع الفيديو</button>
  </form>

  <!-- الفوتر -->
  <footer style="margin-top:40px;">
    <p>© 2026 RevoAI — جميع الحقوق محفوظة</p>
  </footer>

</body>
</html>
