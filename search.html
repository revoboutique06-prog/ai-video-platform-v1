<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>بحث داخل الفيديوهات</title>

  <!-- حماية الصفحة -->
  <script src="auth-check.js"></script>
  <script>checkAuth();</script>

  <style>
    body {
      background:#111;
      color:white;
      font-family:Arial;
      padding:20px;
      text-align:center;
    }
    .box {
      max-width:500px;
      margin:auto;
      background:#1a1a1a;
      padding:20px;
      border-radius:10px;
    }
    button {
      margin-top:15px;
      width:100%;
      padding:12px;
      background:#3498db;
      color:white;
      border:none;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
    }
    button:hover {
      background:#2980b9;
    }
  </style>
</head>

<body>

<h2>بحث داخل الفيديوهات</h2>

<div class="box">
  <label>اكتب كلمة للبحث:</label>
  <input id="query" type="text" style="width:100%; padding:10px; border-radius:8px; margin-top:10px;">

  <button onclick="searchVideos()">🔍 بحث</button>

  <div id="results" style="margin-top:20px;"></div>
</div>

<script>
async function searchVideos() {
  const query = document.getElementById("query").value.trim();

  if (!query) {
    alert("اكتب كلمة للبحث!");
    return;
  }

  const response = await fetch(`/videos/search?query=${query}`);
  const videos = await response.json();

  const container = document.getElementById("results");
  container.innerHTML = "";

  if (videos.length === 0) {
    container.innerHTML = "<p>❌ لا يوجد نتائج.</p>";
    return;
  }

  container.innerHTML = `<p>🔎 عدد النتائج: ${videos.length}</p>`;

  videos.forEach(video => {
    const card = document.createElement("div");
    card.style = "margin-top:20px; background:#1a1a1a; padding:15px; border-radius:10px; color:white;";

    card.innerHTML = `
      <video src="${video.url}" controls style="width:100%; border-radius:8px;"></video>
      <div style="margin-top:10px; opacity:0.8;">📝 ${video.prompt}</div>
      <div style="margin-top:5px; opacity:0.6; font-size:12px;">📅 ${new Date(video.createdAt).toLocaleString()}</div>
    `;

    container.appendChild(card);
  });
}
</script>

</body>
</html>
