<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>سجل الفيديوهات</title>

  <!-- حماية الصفحة -->
  <script src="auth-check.js"></script>
  <script>checkAuth();</script>

  <style>
    body {
      background:#111;
      color:white;
      font-family:Arial;
      padding:20px;
      text-align:center;
    }
    #videosList {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
      gap:20px;
      margin-top:20px;
    }
    .card {
      background:#1a1a1a;
      padding:15px;
      border-radius:10px;
      color:white;
    }
  </style>
</head>

<body>

<h2>سجل الفيديوهات</h2>

<div id="videosList"></div>

<script>
async function loadVideos() {
  const response = await fetch("/videos");
  const videos = await response.json();

  const container = document.getElementById("videosList");
  container.innerHTML = "";

  videos.forEach(video => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <video src="${video.url}" controls style="width:100%; border-radius:8px;"></video>
      <div style="margin-top:10px; opacity:0.8;">📝 ${video.prompt}</div>
      <div style="margin-top:5px; opacity:0.6; font-size:12px;">📅 ${new Date(video.createdAt).toLocaleString()}</div>
    `;

    container.appendChild(card);
  });
}

loadVideos();
</script>

</body>
</html>
