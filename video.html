<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>📥 فيديوهاتك | RevoFlow</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- التحقق من تسجيل الدخول -->
<script src="auth-check.js"></script>
<script>checkAuth();</script>

<style>
  body {
    background:#0d0d0d;
    color:white;
    font-family:Arial;
    padding:20px;
    text-align:center;
  }

  h2 {
    font-size:28px;
    margin-bottom:20px;
  }

  #videosList {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:20px;
    margin-top:20px;
  }

  .card {
    background:#1a1a1a;
    padding:15px;
    border-radius:12px;
    border:1px solid #333;
    transition:0.3s;
  }

  .card:hover {
    transform:scale(1.03);
    border-color:#00c8ff;
  }

  video {
    width:100%;
    border-radius:10px;
  }

  .prompt {
    margin-top:10px;
    opacity:0.85;
    font-size:15px;
  }

  .date {
    margin-top:5px;
    opacity:0.6;
    font-size:12px;
  }
</style>
</head>

<body>

<h2>📥 فيديوهاتك المولّدة</h2>

<div id="videosList"></div>

<script>
async function loadVideos() {
  const response = await fetch("/videos");
  const videos = await response.json();

  const container = document.getElementById("videosList");
  container.innerHTML = "";

  videos.forEach(video => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <video src="${video.url}" controls></video>
      <div class="prompt">🎬 ${video.prompt}</div>
      <div class="date">🕒 ${new Date(video.createdAt).toLocaleString()}</div>
    `;

    container.appendChild(card);
  });
}

loadVideos();
</script>

</body>
</html>
