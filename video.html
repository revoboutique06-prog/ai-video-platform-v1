<script>
    // قراءة رابط الفيديو من LocalStorage
    let videoUrl = localStorage.getItem("video_url");

    // إذا كان الرابط موجود، نعرضه داخل الفيديو
    if (videoUrl) {
        document.querySelector("video source").src = videoUrl;
        document.querySelector("video").load();
    }
</script>
