<h2>سجل الفيديوهات</h2>

<div id="videosList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;"></div>

<script>
async function loadVideos() {
  const response = await fetch("/videos");
  const videos = await response.json();

  const container = document.getElementById("videosList");
  container.innerHTML = "";

  videos.forEach(video => {
    const card = document.createElement("div");
    card.style.background = "#1a1a1a";
    card.style.padding = "15px";
    card.style.borderRadius = "10px";
    card.style.color = "white";

    card.innerHTML = `
      <video src="${video.url}" controls style="width:100%; border-radius:8px;"></video>
      <div style="margin-top:10px; opacity:0.8;">📝 ${video.prompt}</div>
      <div style="margin-top:5px; opacity:0.6; font-size:12px;">📅 ${new Date(video.createdAt).toLocaleString()}</div>
    `;

    container.appendChild(card);
  });
}

loadVideos();
</script>
