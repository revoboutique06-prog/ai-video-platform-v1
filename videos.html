<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>عرض الفيديو</title>
  <style>
    body { background:#0d0d0d; color:white; font-family:Arial; direction:rtl; text-align:center; }
    h2 { margin-top:30px; color:#4a90e2; }
    video { width:90%; max-width:500px; margin-top:20px; border-radius:10px; }
  </style>
</head>
<body>

  <h2>الفيديو الناتج</h2>

  <video id="resultVideo" controls></video>

  <script>
    // قراءة رابط الفيديو من الرابط URL
    const params = new URLSearchParams(window.location.search);
    const videoUrl = params.get("url");

    if (videoUrl) {
      document.getElementById("resultVideo").src = videoUrl;
    } else {
      alert("لا يوجد فيديو للعرض");
    }
  </script>

</body>
</html>
