<h2>سجل الفيديوهات</h2>

<div id="videos" style="display:flex; flex-wrap:wrap; gap:20px;"></div>

<script>
async function loadVideos() {
  const response = await fetch("/videos");
  const videos = await response.json();

  const container = document.getElementById("videos");
  container.innerHTML = "";

  videos.forEach(video => {
    const card = document.createElement("div");
    card.style = "width:300px; background:#1a1a1a; padding:15px; border-radius:10px; color:white;";

    card.innerHTML = `
      <video src="${video.url}" controls style="width:100%; border-radius:8px;"></video>
      <div style="margin-top:10px; opacity:0.8;">📝 ${video.prompt}</div>
      <div style="margin-top:5px; opacity:0.6; font-size:12px;">📅 ${new Date(video.createdAt).toLocaleString()}</div>

      <button onclick="deleteVideo('${video.id}')" 
        style="margin-top:10px; background:#e74c3c; color:white; border:none; padding:8px; border-radius:6px; width:100%;">
        🗑 حذف الفيديو
      </button>
    `;

    container.appendChild(card);
  });
}

async function deleteVideo(id) {
  const confirmDelete = confirm("هل أنت متأكد أنك تريد حذف هذا الفيديو؟");
  if (!confirmDelete) return;

  await fetch(`/videos/${id}`, { method: "DELETE" });
  loadVideos();
}

loadVideos();
    </script>
