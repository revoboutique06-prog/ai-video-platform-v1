<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب - RevoAI</title>
  <style>
    body { background:#0d0d0d; color:white; font-family:Arial; text-align:center; direction:rtl; }
    .logo { display:flex; justify-content:center; align-items:center; margin-top:40px; }
    .logo img { height:70px; margin-left:10px; border-radius:8px; }
    .logo span { font-size:28px; font-weight:bold; color:#4a90e2; }
    form { max-width:350px; margin:auto; margin-top:30px; background:#111; padding:25px; border-radius:10px; text-align:right; }
    input { width:100%; padding:12px; margin:10px 0; background:#222; border:none; border-radius:6px; color:white; }
    button { width:100%; padding:12px; background:#3498db; border:none; border-radius:6px; color:white; font-size:18px; cursor:pointer; }
    a { color:#4a90e2; text-decoration:none; display:block; margin-top:15px; text-align:center; }
  </style>
</head>
<body>

<div class="logo">
  <img src="logo.png" alt="RevoAI">
  <span>RevoAI</span>
</div>

<h2>إنشاء حساب جديد</h2>

<form>
  <label>الاسم الكامل</label>
  <input type="text" placeholder="اسمك الكامل" required>

  <label>البريد الإلكتروني</label>
  <input type="email" placeholder="example@gmail.com" required>

  <label>كلمة المرور</label>
  <input type="password" placeholder="••••••••" required>

  <button type="submit">إنشاء حساب</button>

  <a href="login.html">لديك حساب؟ تسجيل الدخول</a>
</form>

</body>
</html>
