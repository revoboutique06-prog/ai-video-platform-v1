<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إدارة المستخدمين</title>
  <style>
    body { font-family: Arial; background: #f7f7f7; padding: 20px; }
    .card {
      background: #fff;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    button {
      padding: 8px 12px;
      margin-right: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .delete { background: #e74c3c; color: #fff; }
    .ban { background: #f39c12; color: #fff; }
    .unban { background: #2ecc71; color: #fff; }
  </style>
</head>
<body>

  <h2>👥 إدارة المستخدمين</h2>
  <div id="users"></div>

  <script>
    async function loadUsers() {
      const token = localStorage.getItem("token");

      const res = await fetch("http://localhost:3000/users/all", {
        headers: { "Authorization": "Bearer " + token }
      });

      const data = await res.json();
      const container = document.getElementById("users");

      data.users.forEach(user => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <h3>${user.email}</h3>
          <p>الحالة: ${user.banned ? "🚫 محظور" : "✔ نشط"}</p>

          <button class="delete" onclick="deleteUser('${user.id}')">حذف</button>

          ${
            user.banned
              ? `<button class="unban" onclick="unbanUser('${user.id}')">فك الحظر</button>`
              : `<button class="ban" onclick="banUser('${user.id}')">حظر</button>`
          }
        `;

        container.appendChild(card);
      });
    }

    async function deleteUser(id) {
      const token = localStorage.getItem("token");

      const res = await fetch("http://localhost:3000/users/delete/" + id, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + token }
      });

      const data = await res.json();

      if (data.success) {
        alert("✔ تم حذف المستخدم");
        location.reload();
      } else {
        alert("❌ خطأ أثناء الحذف");
      }
    }

    async function banUser(id) {
      const token = localStorage.getItem("token");

      const res = await fetch("http://localhost:3000/users/ban/" + id, {
        method: "PUT",
        headers: { "Authorization": "Bearer " + token }
      });

      const data = await res.json();

      if (data.success) {
        alert("✔ تم حظر المستخدم");
        location.reload();
      } else {
        alert("❌ خطأ أثناء الحظر");
      }
    }

    async function unbanUser(id) {
      const token = localStorage.getItem("token");

      const res = await fetch("http://localhost:3000/users/unban/" + id, {
        method: "PUT",
        headers: { "Authorization": "Bearer " + token }
      });

      const data = await res.json();

      if (data.success) {
        alert("✔ تم فك الحظر");
        location.reload();
      } else {
        alert("❌ خطأ أثناء فك الحظر");
      }
    }

    loadUsers();
  </script>

</body>
</html>
