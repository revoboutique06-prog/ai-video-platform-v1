<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - RevoAI</title>
  <style>
    body {
      background:#111;
      color:white;
      font-family:Arial, sans-serif;
      text-align:center;
      padding:40px;
    }
    .logo {
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:20px;
    }
    .logo img {
      height:60px;
      border-radius:8px;
      margin-right:10px;
    }
    .logo span {
      font-size:24px;
      font-weight:bold;
      color:#4a90e2;
    }
    .card {
      background:#222;
      padding:20px;
      margin:20px auto;
      border-radius:10px;
      width:80%;
    }
  </style>
</head>
<body>

  <!-- شعار RevoAI -->
  <div class="logo">
    <img src="logo.png" alt="RevoAI">
    <span>RevoAI</span>
  </div>

  <!-- عنوان -->
  <h2>📊 لوحة التحكم</h2>

  <!-- بطاقات لوحة التحكم -->
  <div class="card">
    <h3>عدد الفيديوهات</h3>
    <p>10 فيديوهات مرفوعة</p>
  </div>

  <div class="card">
    <h3>عدد المستخدمين</h3>
    <p>25 مستخدم نشط</p>
  </div>

  <div class="card">
    <h3>آخر نشاط</h3>
    <p>تم رفع فيديو جديد قبل ساعة</p>
  </div>

  <!-- الفوتر -->
  <footer style="margin-top:40px;">
    <p>© 2026 RevoAI — جميع الحقوق محفوظة</p>
  </footer>

</body>
</html>
