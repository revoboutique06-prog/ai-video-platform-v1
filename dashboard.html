<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم | RevoFlow</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- حماية الصفحة -->
<script src="auth-check.js"></script>
<script>checkAuth();</script>

<style>
  body {
    background:#0d0d0d;
    color:white;
    font-family:Arial;
    padding:20px;
    text-align:center;
  }

  h2 {
    font-size:28px;
    margin-bottom:20px;
  }

  .btn {
    display:block;
    width:90%;
    max-width:300px;
    margin:15px auto;
    padding:15px;
    background:#00c8ff;
    color:black;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    text-decoration:none;
    transition:0.3s;
  }

  .btn:hover {
    background:#0099cc;
    transform:scale(1.05);
  }

  #logout {
    background:#ff4444;
    color:white;
  }

  #logout:hover {
    background:#cc0000;
  }
</style>
</head>

<body>

<h2>لوحة التحكم</h2>

<a href="generate.html" class="btn">🎬 توليد فيديو جديد</a>

<a href="profile.html" class="btn">👤 معلومات الحساب</a>

<button id="logout" class="btn" onclick="logout()">🚪 تسجيل خروج</button>

<script>
async function logout() {
  await fetch("/auth/logout", { method: "POST" });
  window.location.href = "login.html";
}
</script>

</body>
</html>
