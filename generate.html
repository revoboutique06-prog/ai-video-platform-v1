<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>توليد فيديو - RevoAI</title>
  <style>
    body { background:#0d0d0d; color:white; font-family:Arial; direction:rtl; text-align:center; }
    h2 { margin-top:40px; color:#4a90e2; }
    textarea {
      width:90%; max-width:500px; height:120px;
      margin-top:20px; padding:10px;
      border-radius:8px; border:none;
      font-size:16px;
    }
    .btn {
      display:block;
      width:200px;
      margin:20px auto;
      padding:12px;
      background:#4a90e2;
      color:white;
      border:none;
      border-radius:8px;
      font-size:18px;
      cursor:pointer;
      text-decoration:none;
    }
    .btn:hover { background:#357ac8; }
  </style>
</head>
<body>

  <h2>توليد فيديو جديد</h2>

  <textarea id="text" placeholder="اكتب النص الذي تريد تحويله إلى فيديو"></textarea>

  <button class="btn" onclick="generateVideo()">🎬 توليد الفيديو</button>

  <script>
    async function generateVideo() {
      const text = document.getElementById("text").value;

      if (!text.trim()) {
        alert("الرجاء كتابة نص أولاً");
        return;
      }

      // محاكاة توليد فيديو (API وهمي)
      // هنا لاحقًا تربط API الحقيقي مثل Hailuo أو أي منصة توليد فيديو
      const fakeVideoUrl = "video1.mp4";

      // تحويل المستخدم لصفحة عرض الفيديو
      window.location.href = "video.html?url=" + fakeVideoUrl;
    }
  </script>

</body>
</html>
