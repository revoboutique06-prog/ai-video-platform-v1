<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">

  <!-- حماية الصفحة -->
  <script src="auth-check.js"></script>
  <script>checkAuth();</script>

  <title>توليد فيديو جديد</title>
</head>

<body style="background:#121212; color:white; font-family:Arial; padding:20px;">

<h2>توليد فيديو جديد</h2>

<div style="max-width:500px; margin:auto; background:#1a1a1a; padding:20px; border-radius:10px; color:white;">
  <label>اكتب النص الذي تريد تحويله إلى فيديو:</label>
  <textarea id="prompt" style="width:100%; height:120px; margin-top:10px; border-radius:8px; padding:10px;"></textarea>

  <button onclick="generateVideo()" 
    style="margin-top:15px; width:100%; padding:12px; background:#4CAF50; color:white; border:none; border-radius:8px; font-size:16px;">
    🎬 توليد الفيديو
  </button>

  <div id="result" style="margin-top:20px;"></div>
</div>

<script>
async function generateVideo() {
  const prompt = document.getElementById("prompt").value;

  if (!prompt.trim()) {
    alert("اكتب نص أولاً!");
    return;
  }

  document.getElementById("result").innerHTML = "⏳ جاري توليد الفيديو...";

  const response = await fetch("/videos", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt })
  });

  const data = await response.json();

  if (data.url) {
    document.getElementById("result").innerHTML = `
      <h3>✔ تم توليد الفيديو</h3>
      <video src="${data.url}" controls style="width:100%; border-radius:8px;"></video>
    `;
  } else {
    document.getElementById("result").innerHTML = "❌ حدث خطأ أثناء توليد الفيديو.";
  }
}
</script>

</body>
</html>
