<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>منصة RevoFlow</title>

    <!-- حماية الصفحة -->
    <script src="auth-check.js"></script>
    <script>checkAuth();</script>

    <style>
        body {
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
        }
        .box {
            background: #222;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            margin: auto;
        }
        button {
            background: #0af;
            color: #fff;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background: #08c;
        }
    </style>
</head>
<body>

    <h1>منصة RevoFlow للذكاء الاصطناعي</h1>
    <p>أدخل النص المطلوب لإنشاء فيديو باستخدام الذكاء الاصطناعي.</p>

    <div class="box">
        <textarea id="textInput" rows="6" style="width:100%; border-radius:8px; padding:10px;"></textarea>
        <br><br>

        <button onclick="generateVideo()">🎬 إنشاء الفيديو</button>

        <div id="result" style="margin-top:20px;"></div>
    </div>

    <script>
    async function generateVideo() {
        const prompt = document.getElementById("textInput").value;

        if (!prompt.trim()) {
            alert("اكتب نص أولاً!");
            return;
        }

        document.getElementById("result").innerHTML = "⏳ جاري توليد الفيديو...";

        const response = await fetch("/videos", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt })
        });

        const data = await response.json();

        if (data.url) {
            document.getElementById("result").innerHTML = `
                <h3>✔ تم توليد الفيديو</h3>
                <video src="${data.url}" controls style="width:100%; border-radius:8px;"></video>
            `;
        } else {
            document.getElementById("result").innerHTML = "❌ حدث خطأ أثناء توليد الفيديو.";
        }
    }
    </script>

</body>
</html>
